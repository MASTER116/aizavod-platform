server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    client_max_body_size 50M;

    # ─── ЭТАП 1: Публичный SaaS (визард выбора агентов) ───
    location / {
        root /opt/zavod-ii/web-ui/dist;
        try_files $uri $uri/ /index.html;
    }

    # Каталог отраслей (JSON)
    location /data/ {
        alias /opt/zavod-ii/data/;
        add_header Access-Control-Allow-Origin *;
    }

    # ─── ЭТАП 2: Core (секретный штаб, только основатель) ───
    location /core/ {
        auth_basic "Zavod-ii Core";
        auth_basic_user_file /etc/nginx/.htpasswd;
        alias /opt/zavod-ii/frontend/;
        try_files $uri /core/core.html;
    }

    # n8n dashboard (own auth via N8N_BASIC_AUTH)
    location /n8n/ {
        proxy_pass http://n8n:5678/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    # ─── API (общий для обоих этапов) ───
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /api/webhooks/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://backend:8000;
    }

    location /docs {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # ─── Статические страницы ───
    location /terms {
        alias /opt/zavod-ii/static/terms.html;
        default_type text/html;
    }

    location /privacy {
        alias /opt/zavod-ii/static/privacy.html;
        default_type text/html;
    }

    location /demo {
        alias /opt/zavod-ii/static/demo.html;
        default_type text/html;
    }

    location /planning {
        alias /opt/zavod-ii/static/planning.html;
        default_type text/html;
    }

    # Media files
    location /media/ {
        alias /var/www/media/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
