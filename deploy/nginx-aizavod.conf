# ─── HTTP: лендинг + статика (без SSL, пока нет домена) ───
server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # Лендинг
    location / {
        root /opt/zavod-ii/web-ui/dist;
        try_files $uri $uri/ /index.html;
    }

    # Каталог отраслей (JSON)
    location /data/ {
        alias /opt/zavod-ii/data/;
        add_header Access-Control-Allow-Origin *;
    }

    # Статические страницы
    location /terms {
        alias /opt/zavod-ii/static/terms.html;
        default_type text/html;
    }

    location /privacy {
        alias /opt/zavod-ii/static/privacy.html;
        default_type text/html;
    }

    location /demo {
        alias /opt/zavod-ii/static/demo.html;
        default_type text/html;
    }

    location /planning {
        alias /opt/zavod-ii/static/planning.html;
        default_type text/html;
    }

    location /robots.txt {
        alias /opt/zavod-ii/static/robots.txt;
        default_type text/plain;
        add_header Cache-Control "public, max-age=86400";
    }

    # Media files
    location /media/ {
        alias /var/www/media/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Health (публичный)
    location /health {
        proxy_pass http://backend:8000;
    }

    # API, admin, docs — проксируем на backend
    location /api/ {
        add_header X-Robots-Tag "noai, noimageai" always;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /api/webhooks/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /docs {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
}

# ─── HTTPS: Core (admin) + n8n (только с SSL) ───
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    client_max_body_size 50M;

    # Core — секретный штаб
    location / {
        root /opt/zavod-ii/frontend;
        try_files $uri /core.html;
    }

    # n8n dashboard
    location /n8n/ {
        proxy_pass http://n8n:5678/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    # API через HTTPS тоже работает
    location /api/ {
        add_header X-Robots-Tag "noai, noimageai" always;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://backend:8000;
    }
}
