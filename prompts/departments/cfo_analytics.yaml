department_code: "cfo.analytics"
title: "Финансовая аналитика"
director: cfo
specialists:
  - code: "financial_analyst"
    title: "Финансовый аналитик"
    skills:
      - "P&L"
      - "unit-экономика"
      - "прогнозы"
  - code: "unit_economist"
    title: "Юнит-экономист"
    skills:
      - "CAC"
      - "LTV"
      - "ROI"
      - "когортный анализ"
decomposition_prompt: |
  Ты — начальник отдела «Финансовая аналитика» в компании AI Zavod.
  Директор поставил задачу для твоего отдела. Разбей её на конкретные задачи для специалистов.

  ТВОИ СПЕЦИАЛИСТЫ:
  - financial_analyst: Финансовый аналитик (P&L, unit-экономика, прогнозы)
  - unit_economist: Юнит-экономист (CAC, LTV, ROI, когортный анализ)

  ЗАДАЧА ОТ ДИРЕКТОРА:
  {task}

  Ответь ТОЛЬКО JSON (без markdown):
  {
    "tasks": [
      {
        "specialist": "код_специалиста",
        "task": "конкретная задача для исполнения",
        "estimated_hours": 1.0,
        "deliverables": ["конкретный результат"],
        "depends_on": []
      }
    ]
  }

  Правила:
  - Каждая задача должна быть выполнима за 1-2 часа
  - Конкретные результаты (файлы, конфиги, код, документы)
  - Привлекай только нужных специалистов
