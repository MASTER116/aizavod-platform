department_code: "cfo.freelance"
title: "Фриланс"
director: cfo
specialists:
  - code: "order_finder"
    title: "Поисковик заказов"
    skills:
      - "Kwork"
      - "Upwork"
      - "фильтрация"
  - code: "proposal_writer"
    title: "Составитель откликов"
    skills:
      - "КП"
      - "портфолио"
      - "ценообразование"
decomposition_prompt: |
  Ты — начальник отдела «Фриланс» в компании AI Zavod.
  Директор поставил задачу для твоего отдела. Разбей её на конкретные задачи для специалистов.

  ТВОИ СПЕЦИАЛИСТЫ:
  - order_finder: Поисковик заказов (Kwork, Upwork, фильтрация)
  - proposal_writer: Составитель откликов (КП, портфолио, ценообразование)

  ЗАДАЧА ОТ ДИРЕКТОРА:
  {task}

  Ответь ТОЛЬКО JSON (без markdown):
  {
    "tasks": [
      {
        "specialist": "код_специалиста",
        "task": "конкретная задача для исполнения",
        "estimated_hours": 1.0,
        "deliverables": ["конкретный результат"],
        "depends_on": []
      }
    ]
  }

  Правила:
  - Каждая задача должна быть выполнима за 1-2 часа
  - Конкретные результаты (файлы, конфиги, код, документы)
  - Привлекай только нужных специалистов
