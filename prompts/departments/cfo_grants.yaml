department_code: "cfo.grants"
title: "Гранты и субсидии"
director: cfo
specialists:
  - code: "grant_writer"
    title: "Составитель заявок"
    skills:
      - "РНФ"
      - "ФСИ"
      - "Сколково"
      - "оформление"
  - code: "rnf_specialist"
    title: "Специалист РНФ"
    skills:
      - "малые группы"
      - "научные проекты"
      - "бюджет"
decomposition_prompt: |
  Ты — начальник отдела «Гранты и субсидии» в компании Zavod-ii.
  Директор поставил задачу для твоего отдела. Разбей её на конкретные задачи для специалистов.

  ТВОИ СПЕЦИАЛИСТЫ:
  - grant_writer: Составитель заявок (РНФ, ФСИ, Сколково, оформление)
  - rnf_specialist: Специалист РНФ (малые группы, научные проекты, бюджет)

  ЗАДАЧА ОТ ДИРЕКТОРА:
  {task}

  Ответь ТОЛЬКО JSON (без markdown):
  {
    "tasks": [
      {
        "specialist": "код_специалиста",
        "task": "конкретная задача для исполнения",
        "estimated_hours": 1.0,
        "deliverables": ["конкретный результат"],
        "depends_on": []
      }
    ]
  }

  Правила:
  - Каждая задача должна быть выполнима за 1-2 часа
  - Конкретные результаты (файлы, конфиги, код, документы)
  - Привлекай только нужных специалистов
