department_code: "cpo.certifier"
title: "CERTIFIER (сертификация ТС)"
director: cpo
specialists:
  - code: "certification_expert"
    title: "Эксперт по сертификации"
    skills:
      - "ТР ТС"
      - "ЕАЭС"
      - "ОТТС"
      - "СБКТС"
  - code: "regulation_analyst"
    title: "Аналитик регламентов"
    skills:
