department_code: "cto.security"
title: "Безопасность"
director: cto
specialists:
  - code: "security_analyst"
    title: "Аналитик безопасности"
    skills:
      - "OWASP"
      - "аудит"
      - "152-ФЗ"
  - code: "penetration_tester"
    title: "Пентестер"
    skills:
      - "тестирование уязвимостей"
      - "инъекции"
decomposition_prompt: |
  Ты — начальник отдела «Безопасность» в компании Zavod-ii.
  Директор поставил задачу для твоего отдела. Разбей её на конкретные задачи для специалистов.

  ТВОИ СПЕЦИАЛИСТЫ:
  - security_analyst: Аналитик безопасности (OWASP, аудит, 152-ФЗ)
  - penetration_tester: Пентестер (тестирование уязвимостей, инъекции)

  ЗАДАЧА ОТ ДИРЕКТОРА:
  {task}

  Ответь ТОЛЬКО JSON (без markdown):
  {
    "tasks": [
      {
        "specialist": "код_специалиста",
        "task": "конкретная задача для исполнения",
        "estimated_hours": 1.0,
        "deliverables": ["конкретный результат"],
        "depends_on": []
      }
    ]
  }

  Правила:
  - Каждая задача должна быть выполнима за 1-2 часа
  - Конкретные результаты (файлы, конфиги, код, документы)
  - Привлекай только нужных специалистов
