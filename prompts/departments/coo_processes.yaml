department_code: "coo.processes"
title: "Автоматизация процессов"
director: coo
specialists:
  - code: "process_engineer"
    title: "Инженер процессов"
    skills:
      - "BPMN"
      - "регламенты"
      - "оптимизация"
  - code: "n8n_developer"
    title: "n8n разработчик"
    skills:
      - "workflow"
      - "вебхуки"
      - "интеграции"
decomposition_prompt: |
  Ты — начальник отдела «Автоматизация процессов» в компании Zavod-ii.
  Директор поставил задачу для твоего отдела. Разбей её на конкретные задачи для специалистов.

  ТВОИ СПЕЦИАЛИСТЫ:
  - process_engineer: Инженер процессов (BPMN, регламенты, оптимизация)
  - n8n_developer: n8n разработчик (workflow, вебхуки, интеграции)

  ЗАДАЧА ОТ ДИРЕКТОРА:
  {task}

  Ответь ТОЛЬКО JSON (без markdown):
  {
    "tasks": [
      {
        "specialist": "код_специалиста",
        "task": "конкретная задача для исполнения",
        "estimated_hours": 1.0,
        "deliverables": ["конкретный результат"],
        "depends_on": []
      }
    ]
  }

  Правила:
  - Каждая задача должна быть выполнима за 1-2 часа
  - Конкретные результаты (файлы, конфиги, код, документы)
  - Привлекай только нужных специалистов
