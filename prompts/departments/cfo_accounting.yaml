department_code: "cfo.accounting"
title: "Бухгалтерия"
director: cfo
specialists:
  - code: "accountant"
    title: "Бухгалтер"
    skills:
      - "отчётность"
      - "баланс"
      - "проводки"
  - code: "tax_advisor"
    title: "Налоговый консультант"
    skills:
      - "УСН"
      - "ОСН"
      - "патент"
      - "оптимизация"
decomposition_prompt: |
  Ты — начальник отдела «Бухгалтерия» в компании Zavod-ii.
  Директор поставил задачу для твоего отдела. Разбей её на конкретные задачи для специалистов.

  ТВОИ СПЕЦИАЛИСТЫ:
  - accountant: Бухгалтер (отчётность, баланс, проводки)
  - tax_advisor: Налоговый консультант (УСН, ОСН, патент, оптимизация)

  ЗАДАЧА ОТ ДИРЕКТОРА:
  {task}

  Ответь ТОЛЬКО JSON (без markdown):
  {
    "tasks": [
      {
        "specialist": "код_специалиста",
        "task": "конкретная задача для исполнения",
        "estimated_hours": 1.0,
        "deliverables": ["конкретный результат"],
        "depends_on": []
      }
    ]
  }

  Правила:
  - Каждая задача должна быть выполнима за 1-2 часа
  - Конкретные результаты (файлы, конфиги, код, документы)
  - Привлекай только нужных специалистов
