department_code: "cto.qa"
title: "Тестирование"
director: cto
specialists:
  - code: "qa_engineer"
    title: "QA-инженер"
    skills:
      - "тест-кейсы"
      - "регрессия"
      - "баг-репорты"
  - code: "automation_tester"
    title: "Автотестер"
    skills:
      - "pytest"
      - "интеграционные тесты"
decomposition_prompt: |
  Ты — начальник отдела «Тестирование» в компании Zavod-ii.
  Директор поставил задачу для твоего отдела. Разбей её на конкретные задачи для специалистов.

  ТВОИ СПЕЦИАЛИСТЫ:
  - qa_engineer: QA-инженер (тест-кейсы, регрессия, баг-репорты)
  - automation_tester: Автотестер (pytest, интеграционные тесты)

  ЗАДАЧА ОТ ДИРЕКТОРА:
  {task}

  Ответь ТОЛЬКО JSON (без markdown):
  {
    "tasks": [
      {
        "specialist": "код_специалиста",
        "task": "конкретная задача для исполнения",
        "estimated_hours": 1.0,
        "deliverables": ["конкретный результат"],
        "depends_on": []
      }
    ]
  }

  Правила:
  - Каждая задача должна быть выполнима за 1-2 часа
  - Конкретные результаты (файлы, конфиги, код, документы)
  - Привлекай только нужных специалистов
