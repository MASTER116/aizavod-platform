<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ALTYN CORE — Штаб управления</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b; --surface: rgba(255,255,255,0.03);
            --surface-hover: rgba(255,255,255,0.06);
            --glass: rgba(255,255,255,0.04); --glass-border: rgba(255,255,255,0.08);
            --border: rgba(255,255,255,0.06); --border-hover: rgba(255,255,255,0.14);
            --accent: #d4a017; --accent-light: #f0c040;
            --accent-surface: rgba(212,160,23,0.08);
            --text: #f4f4f5; --text-secondary: #a1a1aa; --text-muted: #52525b;
            --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; --info: #3b82f6;
            --gradient-text: linear-gradient(135deg, #f0c040, #ffd700, #f0c040);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter',system-ui,sans-serif;
            background:var(--bg); color:var(--text);
            min-height:100vh; -webkit-font-smoothing:antialiased;
        }

        /* NAV */
        .topbar {
            position:sticky; top:0; z-index:100;
            height:56px; padding:0 24px;
            display:flex; align-items:center; justify-content:space-between;
            background:rgba(9,9,11,0.9); backdrop-filter:blur(20px);
            border-bottom:1px solid var(--border);
        }
        .topbar-logo { font-size:16px; font-weight:800; letter-spacing:2px; }
        .topbar-logo .ai { color:var(--text); }
        .topbar-logo .core {
            background:var(--gradient-text);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        .topbar-label {
            font-size:11px; color:var(--text-muted); letter-spacing:1px;
            text-transform:uppercase; padding:4px 12px;
            border:1px solid rgba(239,68,68,0.3); border-radius:100px;
            color:#ef4444;
        }
        .topbar-tabs { display:flex; gap:4px; }
        .topbar-tabs button {
            padding:6px 14px; border-radius:8px; border:none;
            background:transparent; color:var(--text-muted);
            font-size:13px; font-weight:500; cursor:pointer;
            font-family:inherit; transition:all 0.2s;
        }
        .topbar-tabs button:hover { color:var(--text); background:var(--surface-hover); }
        .topbar-tabs button.active { color:var(--accent-light); background:var(--accent-surface); }

        /* LAYOUT */
        .container { max-width:1200px; margin:0 auto; padding:24px; }

        /* STATS ROW */
        .stats-row {
            display:grid; grid-template-columns:repeat(4,1fr); gap:12px;
            margin-bottom:24px;
        }
        .stat-card {
            background:var(--glass); border:1px solid var(--glass-border);
            border-radius:14px; padding:20px;
        }
        .stat-card .label { font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; }
        .stat-card .value {
            font-size:28px; font-weight:800; margin-top:6px; letter-spacing:-1px;
        }
        .stat-card .value.gold {
            background:var(--gradient-text);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }

        /* PANELS */
        .panels { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px; }
        .panel {
            background:var(--glass); border:1px solid var(--glass-border);
            border-radius:16px; padding:24px; min-height:300px;
        }
        .panel-title {
            font-size:13px; font-weight:600; color:var(--text-muted);
            text-transform:uppercase; letter-spacing:1.5px;
            margin-bottom:16px; display:flex; align-items:center; gap:8px;
        }
        .panel-full { grid-column:1/-1; }

        /* ORCHESTRATE FORM */
        .orch-form {
            display:flex; gap:12px; margin-bottom:20px;
        }
        .orch-input {
            flex:1; padding:12px 20px; background:var(--bg);
            border:1px solid var(--glass-border); border-radius:12px;
            color:var(--text); font-size:14px; font-family:inherit; outline:none;
        }
        .orch-input:focus { border-color:rgba(212,160,23,0.4); }
        .orch-btn {
            padding:12px 24px; background:var(--accent); color:#000;
            border:none; border-radius:12px; font-size:14px;
            font-weight:700; cursor:pointer; font-family:inherit;
            transition:all 0.2s; white-space:nowrap;
        }
        .orch-btn:hover { background:var(--accent-light); }
        .orch-btn:disabled { opacity:0.4; cursor:not-allowed; }

        /* TREE */
        .tree { font-size:13px; line-height:2; }
        .tree-node { padding-left:20px; border-left:1px solid var(--border); }
        .tree-label {
            display:inline-flex; align-items:center; gap:6px;
            padding:2px 8px; border-radius:6px; cursor:default;
        }
        .tree-label:hover { background:var(--surface-hover); }
        .tree-level { font-size:10px; font-weight:600; padding:1px 6px; border-radius:4px; }
        .tree-level.conductor { background:rgba(212,160,23,0.15); color:var(--accent-light); }
        .tree-level.director { background:rgba(59,130,246,0.15); color:var(--info); }
        .tree-level.department { background:rgba(34,197,94,0.15); color:var(--success); }
        .tree-level.specialist { background:rgba(168,85,247,0.15); color:#a855f7; }

        /* DIRECTORS GRID */
        .directors-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
        .dir-card {
            background:var(--surface); border:1px solid var(--border);
            border-radius:12px; padding:14px 16px;
            transition:all 0.2s;
        }
        .dir-card:hover { border-color:var(--border-hover); background:var(--surface-hover); }
        .dir-title { font-size:13px; font-weight:700; margin-bottom:4px; }
        .dir-scope { font-size:11px; color:var(--text-muted); line-height:1.4; }
        .dir-depts { font-size:11px; color:var(--accent-light); margin-top:6px; }

        /* AGENTS LIST */
        .agents-compact { display:flex; flex-direction:column; gap:6px; max-height:400px; overflow-y:auto; }
        .agent-row-c {
            display:flex; align-items:center; gap:10px;
            padding:8px 12px; border-radius:8px;
            background:var(--surface); border:1px solid var(--border);
            font-size:13px; transition:all 0.2s;
        }
        .agent-row-c:hover { background:var(--surface-hover); }
        .agent-row-c .a-name { font-weight:600; flex:1; }
        .agent-row-c .a-dept { font-size:10px; color:var(--text-muted); }

        /* CHAT PANEL */
        .chat-box {
            height:280px; overflow-y:auto; margin-bottom:12px;
            padding:12px; background:var(--bg); border-radius:12px;
            border:1px solid var(--border);
        }
        .chat-msg { margin-bottom:12px; font-size:13px; line-height:1.5; }
        .chat-msg.user { text-align:right; }
        .chat-msg .bubble {
            display:inline-block; max-width:80%; padding:8px 14px;
            border-radius:12px; white-space:pre-wrap;
        }
        .chat-msg.user .bubble { background:var(--accent); color:#000; }
        .chat-msg.assistant .bubble { background:var(--surface-hover); border:1px solid var(--border); }
        .chat-msg .meta { font-size:10px; color:var(--text-muted); margin-top:4px; }

        /* RESULT BOX */
        #orch-result {
            background:var(--bg); border:1px solid var(--border);
            border-radius:12px; padding:16px; font-size:13px;
            line-height:1.8; max-height:500px; overflow-y:auto;
            white-space:pre-wrap;
        }

        /* RESPONSIVE */
        @media(max-width:768px) {
            .stats-row { grid-template-columns:1fr 1fr; }
            .panels { grid-template-columns:1fr; }
            .directors-grid { grid-template-columns:1fr; }
            .topbar-tabs { display:none; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-logo">
        <span class="ai">AI ALTYN</span>&nbsp;<span class="core">CORE</span>
    </div>
    <div class="topbar-tabs">
        <button class="active" onclick="showTab('dashboard')">Штаб</button>
        <button onclick="showTab('orchestrate')">Маэстро</button>
        <button onclick="showTab('chat')">Чат</button>
    </div>
    <div class="topbar-label">Секретно</div>
</div>

<div class="container">

    <!-- STATS -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="label">Агентов</div>
            <div class="value gold" id="s-agents">19</div>
        </div>
        <div class="stat-card">
            <div class="label">Директоров</div>
            <div class="value gold">9</div>
        </div>
        <div class="stat-card">
            <div class="label">Отделов</div>
            <div class="value gold">28</div>
        </div>
        <div class="stat-card">
            <div class="label">Специалистов</div>
            <div class="value gold">70+</div>
        </div>
    </div>

    <!-- TAB: DASHBOARD -->
    <div id="tab-dashboard">
        <div class="panels">

            <!-- DIRECTORS -->
            <div class="panel">
                <div class="panel-title">Директора (C-level)</div>
                <div class="directors-grid" id="directors-grid"></div>
            </div>

            <!-- AGENTS -->
            <div class="panel">
                <div class="panel-title">Агенты <span id="agents-count" style="color:var(--accent-light)"></span></div>
                <div class="agents-compact" id="agents-list"></div>
            </div>

            <!-- TASK STATS -->
            <div class="panel panel-full">
                <div class="panel-title">Задачи (из БД)</div>
                <div class="stats-row" id="task-stats" style="margin-bottom:0"></div>
            </div>

        </div>
    </div>

    <!-- TAB: ORCHESTRATE -->
    <div id="tab-orchestrate" style="display:none">
        <div class="panel panel-full">
            <div class="panel-title">Маэстро — 3-уровневая оркестрация</div>
            <div class="orch-form">
                <input class="orch-input" id="orch-input" placeholder="Опиши задачу для компании..." />
                <button class="orch-btn" id="orch-btn" onclick="runOrchestrate()">Запустить</button>
            </div>
            <div id="orch-result">Результат декомпозиции появится здесь...

Директора &#8594; Отделы &#8594; Специалисты
Все 3 уровня иерархии.</div>
        </div>
    </div>

    <!-- TAB: CHAT -->
    <div id="tab-chat" style="display:none">
        <div class="panel panel-full">
            <div class="panel-title">Прямой чат с Маэстро</div>
            <div class="chat-box" id="chat-box"></div>
            <div class="orch-form">
                <input class="orch-input" id="chat-input" placeholder="Спроси что угодно..." onkeydown="if(event.key==='Enter')sendChat()" />
                <button class="orch-btn" onclick="sendChat()">Отправить</button>
            </div>
        </div>
    </div>

</div>

<script>
const API = '/api';

const DIRECTORS = [
    { code:'ceo', title:'CEO', scope:'Стратегия, координация', depts:'-' },
    { code:'cto', title:'CTO', scope:'Архитектура, код, DevOps', depts:'6 отделов' },
    { code:'cfo', title:'CFO', scope:'Финансы, гранты, фриланс', depts:'4 отдела' },
    { code:'cmo', title:'CMO', scope:'Маркетинг, контент, PR', depts:'4 отдела' },
    { code:'coo', title:'COO', scope:'Операции, процессы', depts:'3 отдела' },
    { code:'cpo', title:'CPO', scope:'Продукт, roadmap, UX', depts:'3 отдела' },
    { code:'cdo', title:'CDO', scope:'Дизайн, UI/UX, бренд', depts:'3 отдела' },
    { code:'chro', title:'CHRO', scope:'Кадры, найм, культура', depts:'2 отдела' },
    { code:'clo', title:'CLO', scope:'Юридическое, IP, договоры', depts:'3 отдела' },
];

// TABS
function showTab(name) {
    document.querySelectorAll('[id^="tab-"]').forEach(t => t.style.display = 'none');
    document.getElementById('tab-' + name).style.display = '';
    document.querySelectorAll('.topbar-tabs button').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
}

// DIRECTORS
function renderDirectors() {
    const grid = document.getElementById('directors-grid');
    grid.innerHTML = DIRECTORS.map(d => `
        <div class="dir-card">
            <div class="dir-title">${d.title}</div>
            <div class="dir-scope">${d.scope}</div>
            <div class="dir-depts">${d.depts}</div>
        </div>`).join('');
}

// AGENTS
async function loadAgents() {
    try {
        const res = await fetch(API + '/conductor/agents');
        const agents = await res.json();
        document.getElementById('s-agents').textContent = agents.length;
        document.getElementById('agents-count').textContent = agents.length;
        const list = document.getElementById('agents-list');
        list.innerHTML = agents.map(a => `
            <div class="agent-row-c">
                <span class="a-name">${esc(a.title)}</span>
                <span class="a-dept">${esc(a.department)}</span>
            </div>`).join('');
    } catch(e) {}
}

// TASK STATS
async function loadDashboard() {
    try {
        const res = await fetch(API + '/conductor/dashboard');
        const data = await res.json();
        const el = document.getElementById('task-stats');
        const statuses = data.by_status || {};
        el.innerHTML = Object.entries(statuses).map(([k,v]) => `
            <div class="stat-card">
                <div class="label">${k}</div>
                <div class="value">${v}</div>
            </div>`).join('');
    } catch(e) {}
}

// ORCHESTRATE
async function runOrchestrate() {
    const input = document.getElementById('orch-input');
    const task = input.value.trim();
    if (!task) return;

    const btn = document.getElementById('orch-btn');
    const result = document.getElementById('orch-result');
    btn.disabled = true;
    result.textContent = 'Маэстро анализирует задачу...\nCEO \u2192 Директора \u2192 Отделы \u2192 Специалисты\n\nЭто займёт 15-30 секунд...';

    try {
        const res = await fetch(API + '/conductor/orchestrate', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ task, priority: 'normal', depth: 3 }),
        });
        const tree = await res.json();

        if (tree.status === 'error') {
            result.textContent = '\u274c ' + (tree.message || 'Ошибка');
            btn.disabled = false;
            return;
        }

        let out = `\u2705 Задача: ${task}\n`;
        out += `\ud83d\udcca Анализ: ${tree.analysis || ''}\n`;
        out += `\u23f1 ${Math.round(tree.duration_ms || 0)}ms\n`;
        out += `ID: ${tree.task_id || '?'} | Специалистов: ${tree.total_specialists || 0}\n`;
        out += '\u2500'.repeat(50) + '\n\n';

        (tree.directors || []).forEach(d => {
            out += `\ud83d\udc54 ${d.title || d.role} [${d.priority || 'normal'}]\n`;
            out += `   ${d.task}\n`;
            (d.departments || []).forEach(dept => {
                out += `   \ud83d\udcc1 ${dept.department}: ${dept.task}\n`;
                (dept.specialists || []).forEach(s => {
                    out += `      \ud83d\udc64 ${s.specialist}: ${s.task}\n`;
                });
            });
            out += '\n';
        });

        const r = tree.report || {};
        if (r.summary) {
            out += '\u2500'.repeat(50) + '\n';
            out += `\ud83d\udcca Итог: ${r.summary}\n`;
            (r.highlights || []).forEach(h => out += `  \u2705 ${h}\n`);
            (r.next_steps || []).forEach(n => out += `  \u27a1\ufe0f ${n}\n`);
        }

        result.textContent = out;
    } catch(e) {
        result.textContent = '\u274c Ошибка: ' + e.message;
    }
    btn.disabled = false;
}

// CHAT
async function sendChat() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    addChat('user', msg);

    try {
        const res = await fetch(API + '/conductor/route', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ query: msg }),
        });
        const data = await res.json();
        addChat('assistant', data.response, `${data.agent} | ${data.department} | ${Math.round(data.confidence*100)}%`);
    } catch(e) {
        addChat('assistant', 'Ошибка: ' + e.message, 'system');
    }
}

function addChat(role, text, meta) {
    const box = document.getElementById('chat-box');
    const div = document.createElement('div');
    div.className = 'chat-msg ' + role;
    div.innerHTML = `<div class="bubble">${esc(text)}</div>` +
        (meta ? `<div class="meta">${esc(meta)}</div>` : '');
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

document.getElementById('orch-input').addEventListener('keydown', e => { if(e.key==='Enter') runOrchestrate(); });

renderDirectors();
loadAgents();
loadDashboard();
</script>
</body>
</html>
