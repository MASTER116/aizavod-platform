            --glass: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.08);
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.14);
            --accent: #d4a017;
            --accent-light: #f0c040;
            --accent-surface: rgba(212,160,23,0.08);
            --text: #f4f4f5;
            --text-secondary: #a1a1aa;
            --text-muted: #52525b;
            --success: #22c55e;
            --gradient-text: linear-gradient(135deg, #f0c040, #ffd700, #f0c040);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* === AMBIENT === */
        .ambient {
            position: fixed; inset: 0;
            pointer-events: none; z-index: 0;
        }
        .ambient::before {
            content: ''; position: absolute; top: -20%; left: -5%;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(212,160,23,0.06) 0%, transparent 70%);
            animation: float1 20s ease-in-out infinite;
        }
        .ambient::after {
            content: ''; position: absolute; bottom: -15%; right: -5%;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(240,192,64,0.04) 0%, transparent 70%);
            animation: float2 25s ease-in-out infinite;
        }
        @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,60px)} }
        @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-40px,-40px)} }

        .page { position: relative; z-index: 2; }

        /* === HEADER === */
        .header {
            position: sticky; top: 0; z-index: 100;
            padding: 0 32px; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(9,9,11,0.85);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);

        .logo { font-size: 20px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; }
        .logo-ai { color: var(--text); }
        .logo-altyn {
            background: var(--gradient-text);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .header-stats {
            display: flex; gap: 24px; font-size: 12px; color: var(--text-muted);
        }
        .header-stats span { font-weight: 600; color: var(--accent-light); }

        /* === HERO (compact) === */
        .hero {
            max-width: 900px; margin: 0 auto;
            padding: 60px 32px 40px; text-align: center;
        }
        .hero h1 {
            font-size: clamp(28px, 4vw, 44px);
            font-weight: 800; line-height: 1.15; letter-spacing: -1.5px;
            margin-bottom: 16px;
        }
        .hero h1 .gr {
            background: var(--gradient-text);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .hero p {
            font-size: 16px; color: var(--text-secondary);
            max-width: 520px; margin: 0 auto; line-height: 1.6;
        }

        /* === BREADCRUMB / STEPS === */
        .steps-bar {
            max-width: 900px; margin: 0 auto;
            padding: 0 32px 32px;
            display: flex; align-items: center; gap: 8px;
            flex-wrap: wrap;
        }
        .step-chip {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 14px; border-radius: 100px;
            font-size: 13px; font-weight: 500;
            background: var(--surface); border: 1px solid var(--glass-border);
            color: var(--text-muted); cursor: pointer;
            transition: all 0.2s;
        }
        .step-chip.active {
            background: var(--accent-surface);
            border-color: rgba(212,160,23,0.25);
            color: var(--accent-light);
        }
        .step-chip.done {
            background: rgba(34,197,94,0.08);
            border-color: rgba(34,197,94,0.2);
            color: var(--success);
        }
        .step-chip.done:hover { background: rgba(34,197,94,0.12); }
        .step-chip .num {
            width: 20px; height: 20px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700;
            background: var(--glass-border); color: var(--text-muted);
        }
        .step-chip.active .num { background: rgba(212,160,23,0.2); color: var(--accent-light); }
        .step-chip.done .num { background: rgba(34,197,94,0.2); color: var(--success); }
        .step-arrow { color: var(--text-muted); font-size: 14px; }

        /* === WIZARD CONTAINER === */
        .wizard {
            max-width: 900px; margin: 0 auto;
            padding: 0 32px 80px;
        }
        .wizard-title {
            font-size: 15px; font-weight: 600; color: var(--text-secondary);
            margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px;
        }
        .wizard-title .count {
            font-size: 12px; color: var(--text-muted);
            background: var(--surface); padding: 2px 10px;
            border-radius: 100px;
        }

        /* === SELECTION GRID === */
        .sel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }
        .sel-grid.large { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
        .sel-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 16px 20px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            display: flex; align-items: center; gap: 14px;
        }
        .sel-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            background: var(--surface-hover);
        }
        .sel-card:active { transform: translateY(0); }
        .sel-card .icon {
            width: 40px; height: 40px; min-width: 40px;
            border-radius: 10px; display: flex;
            align-items: center; justify-content: center;
            font-size: 20px;
            background: var(--accent-surface);
            border: 1px solid rgba(212,160,23,0.1);

        .sel-card .sub {
            font-size: 12px; color: var(--text-muted); margin-top: 2px;
        }
        .sel-card .arrow {
            color: var(--text-muted); font-size: 16px;

        }
        .sel-card:hover .arrow { transform: translateX(3px); color: var(--accent-light); }

            font-size: 13px; font-weight: 500;
            background: var(--surface); border: 1px solid var(--glass-border);
            color: var(--text-secondary); cursor: pointer;
            transition: all 0.2s; margin-bottom: 20px;
            font-family: inherit;
        }
        .back-btn:hover { background: var(--surface-hover); color: var(--text); }

        /* === FOOTER === */
        .footer {
            border-top: 1px solid var(--border);
            padding: 32px;
        }
        .footer-content {
            max-width: 900px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
        }
        .footer-left { font-size: 12px; color: var(--text-muted); }
        .footer-links { display: flex; gap: 20px; }
        .footer-links a {
            font-size: 12px; color: var(--text-muted);
            text-decoration: none; transition: color 0.2s;
        }
        .footer-links a:hover { color: var(--text-secondary); }

        /* === ANIMATIONS === */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.35s ease forwards; }

        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            .header { padding: 0 20px; }
            .hero { padding: 40px 20px 28px; }
            .steps-bar, .wizard { padding-left: 20px; padding-right: 20px; }
            .sel-grid { grid-template-columns: 1fr; }
            .sel-grid.large { grid-template-columns: 1fr; }
            .header-stats { display: none; }
            .footer-content { flex-direction: column; gap: 12px; text-align: center; }
            .agents-result { padding: 20px; }
        }
    </style>
</head>

function render() {
    renderSteps();
    renderWizard();
}

function renderSteps() {
    const bar = document.getElementById('steps-bar');
    let html = '';
    STEPS.forEach((s, i) => {
        let cls = 'step-chip';
        let val = '';
        if (s.num < state.step) {
            cls += ' done';
            if (s.num === 1) val = state.country?.name || '';
            if (s.num === 2) val = state.city || '';
            if (s.num === 3) val = state.category || '';
            if (s.num === 4) val = state.industry || '';
        } else if (s.num === state.step) {
            cls += ' active';
        }
        const clickable = s.num < state.step;
        html += `<div class="${cls}" ${clickable ? `onclick="goToStep(${s.num})"` : ''}>
            <span class="num">${s.num < state.step ? '\u2713' : s.num}</span>
            ${val || s.label}
        </div>`;
        if (i < STEPS.length - 1) html += '<span class="step-arrow">\u203A</span>';
    });
    bar.innerHTML = html;
}

function renderWizard() {
    const w = document.getElementById('wizard');
    switch(state.step) {
        case 1: renderCountries(w); break;
        case 2: renderCities(w); break;
        case 3: renderCategories(w); break;
        case 4: renderIndustries(w); break;
        case 5: renderAgents(w); break;
    }
}

function renderCountries(el) {
    el.innerHTML = `
        <div class="wizard-title">Выберите страну <span class="count">${COUNTRIES.length}</span></div>
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:20px;line-height:1.5">
            AI-агенты работают по законодательству выбранной страны: налоги, лицензии, сертификация, трудовое право.
        </div>
        <div class="sel-grid fade-up">
            ${COUNTRIES.map(c => `
                <div class="sel-card" onclick="selectCountry('${c.code}')">
                    <div class="icon">${c.flag}</div>
                    <div class="info"><div class="name">${c.name}</div></div>
                    <div class="arrow">\u203A</div>
                </div>`).join('')}
        </div>`;
}

function renderCities(el) {
    const cities = CITIES[state.country.code] || [];
    const hidden = cities.length > CITIES_VISIBLE ? cities.length - CITIES_VISIBLE : 0;
    el.innerHTML = `
        <button class="back-btn" onclick="goBack()">\u2190 Назад</button>
        <div class="wizard-title">Выберите город <span class="count">${cities.length} ${declN(cities.length, ['город','города','городов'])}</span></div>
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px;line-height:1.5">
            Город влияет на доступные льготы, программы поддержки бизнеса и региональное законодательство.
        </div>
        <div class="search-wrap">
            <input class="search-input" id="city-search" placeholder="Введите название города для поиска..." oninput="filterCities(this.value)" />
            ${hidden > 0 ? `<div style="font-size:12px;color:var(--text-muted);margin-top:8px" id="city-hint">Показаны ${CITIES_VISIBLE} крупнейших. Ещё ${hidden} — начните вводить название</div>` : ''}
        </div>
        <div class="sel-grid fade-up" id="cards-grid">
            ${cities.map((c, i) => `
                <div class="sel-card" data-name="${c.toLowerCase()}" ${i >= CITIES_VISIBLE ? 'style="display:none" data-hidden="1"' : ''} onclick="selectCity('${esc(c)}')">
                    <div class="icon">${state.country.flag}</div>
                    <div class="info"><div class="name">${c}</div></div>
                    <div class="arrow">\u203A</div>
                </div>`).join('')}
        </div>`;
}

function renderCategories(el) {
    let categories = [];
    if (catalogData && catalogData.industries) {
        const cats = {};
        catalogData.industries.forEach(i => {
            if (!cats[i.category]) cats[i.category] = 0;
            cats[i.category]++;
        });
        categories = Object.entries(cats).sort((a,b) => a[0].localeCompare(b[0],'ru'));
    }

    el.innerHTML = `
        <button class="back-btn" onclick="goBack()">\u2190 Назад</button>
        <div class="wizard-title">Выберите отрасль <span class="count">${categories.length}</span></div>
        <div class="search-wrap">
            <input class="search-input" placeholder="Поиск отрасли..." oninput="filterCards(this.value)" />
        </div>
        <div class="sel-grid large fade-up" id="cards-grid">
            ${categories.map(([cat, count]) => `
                <div class="sel-card" data-name="${cat.toLowerCase()}" onclick="selectCategory('${esc(cat)}')">
                    <div class="icon">${CATEGORY_ICONS[cat] || '\u{1F4C1}'}</div>
                    <div class="info">
                        <div class="name">${cat}</div>
                        <div class="sub">${count} ${declN(count, ['направление','направления','направлений'])}</div>
                    </div>
                    <div class="arrow">\u203A</div>
                </div>`).join('')}
        </div>`;
}

function renderIndustries(el) {
    let industries = [];
    if (catalogData && catalogData.industries) {
        industries = catalogData.industries.filter(i => i.category === state.category);
    }

    el.innerHTML = `
        <button class="back-btn" onclick="goBack()">\u2190 Назад</button>
        <div class="wizard-title">${state.category} <span class="count">${industries.length}</span></div>
        <div class="sel-grid large fade-up" id="cards-grid">
            ${industries.map(ind => `
                <div class="sel-card" data-name="${ind.industry.toLowerCase()}" onclick="selectIndustry('${esc(ind.industry)}')">
                    <div class="icon">${CATEGORY_ICONS[state.category] || '\u{1F4C1}'}</div>
                    <div class="info">
                        <div class="name">${ind.industry}</div>
                        <div class="sub">ОКВЭД ${ind.okved}</div>
                    </div>
                    <div class="arrow">\u203A</div>
                </div>`).join('')}
        </div>`;
}

function renderAgents(el) {
    const agents = agentsData || [];
    const ind = catalogData?.industries?.find(i => i.industry === state.industry);

    el.innerHTML = `
        <button class="back-btn" onclick="goBack()">\u2190 Назад</button>
        <div class="agents-result fade-up">
            <div class="result-header">
                <h2>AI-агенты для &laquo;${state.industry}&raquo;</h2>
                <p>${state.country.flag} ${state.country.name}, ${state.city} &bull; ${state.category}</p>
                ${ind ? `<div class="result-tag">ОКВЭД ${ind.okved} &mdash; ${ind.okved_description}</div>` : ''}
            </div>
            <div class="agents-list">
                ${agents.map(a => {
                    const color = DEPT_COLORS[a.department] || '#6b7280';
                    const icon = AGENT_ICONS[a.name] || '\u{1F916}';
                    return `<div class="agent-row">
                        <div class="a-icon">${icon}</div>
                        <div class="a-info">
                            <div class="a-name">${a.title}</div>
                            <div class="a-desc">${a.description}</div>
                        </div>
                        <span class="a-dept" style="background:${color}18;color:${color};border:1px solid ${color}30">${a.department}</span>
                    </div>`;
                }).join('')}
            </div>
        </div>`;
}

// ─── ACTIONS ────────────────────────────────────────────────────────────────

function selectCountry(code) {
    state.country = COUNTRIES.find(c => c.code === code);
    state.step = 2;
    render();
    scrollTop();
}

function selectCity(city) {
    state.city = city;
    state.step = 3;
    render();
    scrollTop();
}

function selectCategory(cat) {
    state.category = cat;
    state.step = 4;
    render();
    scrollTop();
}

function selectIndustry(ind) {
    state.industry = ind;
    state.step = 5;
    render();
    scrollTop();
}

function goToStep(n) {
    state.step = n;
    if (n <= 1) { state.country = null; state.city = null; state.category = null; state.industry = null; }
    if (n <= 2) { state.city = null; state.category = null; state.industry = null; }
    if (n <= 3) { state.category = null; state.industry = null; }
    if (n <= 4) { state.industry = null; }
    render();
    scrollTop();
}

function goBack() {
    if (state.step > 1) goToStep(state.step - 1);
}

function filterCards(q) {
    const grid = document.getElementById('cards-grid');
    if (!grid) return;
    const lower = q.toLowerCase();
    grid.querySelectorAll('.sel-card').forEach(card => {
        const name = card.getAttribute('data-name') || '';
        card.style.display = name.includes(lower) ? '' : 'none';
    });
}

function filterCities(q) {
    const grid = document.getElementById('cards-grid');
    if (!grid) return;
    const lower = q.toLowerCase().trim();
    const hint = document.getElementById('city-hint');

    grid.querySelectorAll('.sel-card').forEach((card, i) => {
        const name = card.getAttribute('data-name') || '';
        const isHidden = card.getAttribute('data-hidden') === '1';

        if (!lower) {
            // Нет поиска — показать первые N, скрыть остальные
            card.style.display = isHidden ? 'none' : '';
        } else {
            // Есть поиск — фильтровать по имени, показывать все совпадения
            card.style.display = name.includes(lower) ? '' : 'none';
        }
    });

    if (hint) hint.style.display = lower ? 'none' : '';
}

function scrollTop() {
    document.querySelector('.wizard').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function esc(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function declN(n, forms) {
    const abs = Math.abs(n) % 100;
    const n1 = abs % 10;
    if (abs > 10 && abs < 20) return forms[2];
    if (n1 > 1 && n1 < 5) return forms[1];
    if (n1 === 1) return forms[0];
    return forms[2];
}

init();
</script>
